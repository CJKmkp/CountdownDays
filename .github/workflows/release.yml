name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6.0.2
        with:
          path: CountdownDays

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '6.0.x'

      - name: Restore + Publish
        shell: pwsh
        run: |
          dotnet restore CountdownDays/CountdownDays.csproj
          dotnet publish CountdownDays/CountdownDays.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=false -p:PublishReadyToRun=false -o CountdownDays/publish

      - name: Package .icpx
        id: package
        shell: pwsh
        run: |
          $outputDir = "CountdownDays/publish"
          $manifest = Get-Content "$outputDir/manifest.json" -Raw | ConvertFrom-Json
          $pluginId = $manifest.Id
          $entry = $manifest.EntranceAssembly
          $depsFile = ($entry -replace '\.dll$', '.deps.json')

          $workDir = Join-Path $env:TEMP "icpx_build"
          if (Test-Path $workDir) { Remove-Item $workDir -Recurse -Force }
          New-Item -ItemType Directory -Path $workDir | Out-Null

          Copy-Item "$outputDir/manifest.json" $workDir
          Copy-Item "$outputDir/$entry" $workDir
          if (Test-Path "$outputDir/$depsFile") { Copy-Item "$outputDir/$depsFile" $workDir }

          $icon = Get-ChildItem -Path $outputDir -Filter "icon.*" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($icon) { Copy-Item $icon.FullName $workDir }

          $pluginFolder = Join-Path $workDir $pluginId
          New-Item -ItemType Directory -Path $pluginFolder | Out-Null
          Get-ChildItem $workDir -File | ForEach-Object {
            Move-Item $_.FullName $pluginFolder
          }

          $outDir = "CountdownDays/packages"
          New-Item -ItemType Directory -Path $outDir -Force | Out-Null
          $version = $manifest.Version
          $icpxName = "$pluginId-$version.icpx"
          $icpxPath = Join-Path $outDir $icpxName
          Get-ChildItem $pluginFolder -Recurse | Compress-Archive -DestinationPath $icpxPath -Force
          if (Test-Path $workDir) { Remove-Item $workDir -Recurse -Force }
          "icpx=$icpxPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: com.icc.countdown-days
          path: ${{ steps.package.outputs.icpx }}
          if-no-files-found: error

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            ${{ steps.package.outputs.icpx }}

  emit-market-yaml:
    runs-on: ubuntu-latest
    needs: release
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v6.0.2
        with:
          path: CountdownDays

      - name: Setup .NET
        uses: actions/setup-dotnet@v5.2.0
        with:
          dotnet-version: '6.0.x'

      - name: Generate PluginIndex YAML
        shell: bash
        run: |
          cat <<'EOF' > /tmp/plugin.yml
          id: com.icc.countdown-days
          name: 桌面倒计日
          version: __VERSION__
          description: 桌面倒计时与纪念日小工具，支持多个目标、临近提醒、可拖动悬浮
          author: ICC-CE
          entranceAssembly: CountdownDays.dll
          url: https://github.com/CJKmkp/CountdownDays
          repoOwner: CJKmkp
          repoName: CountdownDays
          downloadPath: releases/download/__TAG__/com.icc.countdown-days-__VERSION__.icpx
          iconPath: ""
          EOF

          VERSION=$(jq -r .Version CountdownDays/publish/manifest.json)
          TAG="${GITHUB_REF_NAME:-v$VERSION}"
          sed -i "s|__VERSION__|$VERSION|g; s|__TAG__|$TAG|g" /tmp/plugin.yml

          mkdir -p market
          cp /tmp/plugin.yml market/com.icc.countdown-days.yml

      - name: Upload PluginIndex YAML
        uses: actions/upload-artifact@v5
        with:
          name: plugin-market-yaml
          path: market/com.icc.countdown-days.yml
          if-no-files-found: error